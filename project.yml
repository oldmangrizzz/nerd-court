name: NerdCourt
options:
  bundleIdPrefix: com.grizzlymedicine
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.5"

settings:
  base:
    SWIFT_VERSION: "6.0"
    OTHER_SWIFT_FLAGS: "-Xfrontend -strict-concurrency=complete"

packages: {}

targets:
  NerdCourt:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - sdk: SpriteKit.framework
      - sdk: AVFoundation.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grizzlymedicine.nerdcourt
        DEVELOPMENT_TEAM: T5AFHQ4L9C
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "6"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleIconName: "AppIcon"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSAppTransportSecurity_NSAAllowsArbitraryLoads: NO
        INFOPLIST_KEY_NSAppTransportSecurity_NSAExceptionDomains:
          "delta.local":
            NSIncludesSubdomains: YES
            NSExceptionAllowsInsecureHTTPLoads: YES
            NSExceptionMinimumTLSVersion: TLSv1.0
    preBuildScripts: []
    postBuildScripts: []

  NerdCourtTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/NerdCourtTests
    dependencies:
      - target: NerdCourt
    settings:
      base:
        CODE_SIGNING_ALLOWED: NO
        TEST_TARGET_NAME: NerdCourt

  NerdCourtUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/NerdCourtUITests
    dependencies:
      - target: NerdCourt
    settings:
      base:
        CODE_SIGNING_ALLOWED: NO
        TEST_TARGET_NAME: NerdCourt
